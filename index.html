<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cingo Remote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a3d52; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.2); }
        .switch input:checked + .slider { background-color: #4ade80; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body class="flex flex-col items-center p-6">
    <div class="glass w-full max-w-sm p-8 text-center shadow-2xl">
        <h1 class="text-xl font-bold mb-6">Controle Remoto</h1>
        <label class="relative inline-block w-14 h-8 mb-2">
            <input type="checkbox" id="statusToggle" checked class="opacity-0 w-0 h-0">
            <span class="slider absolute cursor-pointer top-0 left-0 right-0 bottom-0 bg-gray-600 transition rounded-full"></span>
        </label>
        <div id="statusText" class="text-xl font-bold mb-6 text-green-400">Rodando</div>
        <div class="bg-black/20 rounded-xl p-4 text-left text-sm">
            <p class="font-bold mb-3 border-b border-white/10 pb-1">Programação da Semana</p>
            <div id="cal"></div>
        </div>
        <input type="password" id="ghToken" placeholder="Colar Token PAT" class="w-full mt-4 bg-white/10 p-2 rounded text-xs text-center border border-white/20">
        <button onclick="save()" class="w-full mt-4 bg-blue-500 py-3 rounded-xl font-bold active:scale-95 transition">SALVAR</button>
    </div>

    <script>
        const repo = "SEU_USUARIO/NOME_DO_REPO"; // <--- ALTERE AQUI!
        const cal = document.getElementById('cal');
        for(let i=0; i<7; i++){
            let d = new Date(); d.setDate(d.getDate()+i);
            let iso = d.toISOString().split('T')[0];
            let check = (d.getDay()==0 || d.getDay()==6) ? "" : "checked";
            cal.innerHTML += `<div class="flex justify-between py-1"><span>${d.toLocaleDateString('pt-BR',{weekday:'short', day:'numeric'})}</span><input type="checkbox" class="d-check" data-date="${iso}" ${check}></div>`;
        }

        async function carregarStatusAtual() {
    const resp = await fetch('config.json');
    const config = await resp.json();
    
    document.getElementById('lastSync').innerText = config.ultimo_ponto || "Nenhum registro hoje";
    document.getElementById('statusToggle').checked = (config.status === "rodando");
    updateStatusLabel();
        
        async function save() {
            const token = document.getElementById('ghToken').value;
            const config = {
                status: document.getElementById('statusToggle').checked ? "rodando" : "parado",
                dias_permitidos: Array.from(document.querySelectorAll('.d-check:checked')).map(e => e.dataset.date)
            };
            const get = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {headers:{Authorization:`token ${token}`}});
            const data = await get.json();
            await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
                method: "PUT",
                headers: { Authorization:`token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Update", content: btoa(JSON.stringify(config)), sha: data.sha })
            });
            alert("Salvo com sucesso!");
        }
    </script>
</body>
</html>
