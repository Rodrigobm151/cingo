<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cingo Remote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #1a5f7a 0%, #0a3d52 100%); min-height: 100vh; color: white; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 2rem; }
        .switch { position: relative; display: inline-block; width: 80px; height: 40px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 32px; width: 32px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4ade80; }
        input:checked + .slider:before { transform: translateX(40px); }
        .day-row { border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 10px 0; }
    </style>
</head>
<body class="flex flex-col items-center p-6">

    <div class="glass w-full max-w-sm p-8 text-center shadow-2xl">
        <h1 class="text-2xl font-semibold mb-8">Controle Remoto</h1>
        
        <p class="text-sm text-blue-200 mb-2">Status do Script</p>
        <label class="switch mb-4">
            <input type="checkbox" id="statusToggle" checked onchange="updateStatusLabel()">
            <span class="slider"></span>
        </label>
        <div id="statusText" class="text-2xl font-bold mb-8">Rodando</div>

        <div class="mb-8">
            <p class="text-xs text-blue-300 uppercase tracking-widest">Última marcação</p>
            <p id="lastSync" class="text-lg font-medium">Carregando...</p>
        </div>

        <div class="bg-white/5 rounded-2xl p-4 text-left">
            <p class="text-sm font-bold mb-4 border-b border-white/10 pb-2">Programação da semana</p>
            <div id="calendarList">
                </div>
        </div>

        <input type="password" id="ghToken" placeholder="Colar Token para Salvar" class="w-full mt-6 bg-black/20 border border-white/10 rounded-lg p-2 text-xs text-center focus:outline-none focus:border-blue-400">
        
        <button onclick="saveToGitHub()" class="w-full mt-4 bg-blue-500 hover:bg-blue-400 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95">
            SALVAR CONFIGURAÇÃO
        </button>
    </div>

    <script>
        const statusToggle = document.getElementById('statusToggle');
        const statusText = document.getElementById('statusText');
        
        function updateStatusLabel() {
            statusText.innerText = statusToggle.checked ? "Rodando" : "Parado";
            statusText.className = statusToggle.checked ? "text-2xl font-bold mb-8 text-green-400" : "text-2xl font-bold mb-8 text-red-400";
        }

        // Gerar próximos 7 dias úteis
        const list = document.getElementById('calendarList');
        const diasSemana = ['dom', 'seg', 'ter', 'qua', 'qui', 'sex', 'sáb'];
        
        for(let i=0; i<7; i++) {
            let d = new Date();
            d.setDate(d.getDate() + i);
            const dateStr = d.toLocaleDateString('pt-BR');
            const isWeekend = d.getDay() === 0 || d.getDay() === 6;
            const checked = isWeekend ? "" : "checked";

            list.innerHTML += `
                <div class="day-row flex justify-between items-center">
                    <span class="${isWeekend ? 'text-gray-400' : 'text-white'}">
                        ${diasSemana[d.getDay()]} ${dateStr.slice(0,5)}
                    </span>
                    <input type="checkbox" class="date-check w-5 h-5 rounded" data-date="${d.toISOString().split('T')[0]}" ${checked}>
                </div>
            `;
        }

        async function saveToGitHub() {
            const token = document.getElementById('ghToken').value;
            if(!token) return alert("Insira o Token do GitHub!");

            const config = {
                status: statusToggle.checked ? "rodando" : "parado",
                dias_permitidos: Array.from(document.querySelectorAll('.date-check:checked')).map(el => el.dataset.date),
                last_update: new Date().toLocaleString()
            };

            // Lógica para salvar via API do GitHub (exige o Token PAT)
            alert("Enviando comando para o GitHub...");
            // Aqui você faria o fetch para a API do GitHub para atualizar o config.json
        }
    </script>
</body>
</html>
